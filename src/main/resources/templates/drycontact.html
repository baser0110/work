<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="ISO-8859-1">
    <title>External Alarms Manager</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>

<body>
    <header th:replace="~{fragments/header :: header}"></header>
    <main>
<div class="container my-2">

    <script>
        function searchByUserLabel() {
            let inputValue = document.getElementById("userLabel").value;
            if (inputValue === "") {
                event.preventDefault();
                alert("Search form is empty!")
            } else {
                let form = document.getElementById("search");
                form.action = "/helper/dryContact/" + inputValue;
            }
        }

        function handleSearch(formElement) {
            let inputValue = document.getElementById("userLabel").value;

            if (inputValue.trim() === "") {
                alert("Search form is empty!");
                return false;
            }

            const btn = formElement.querySelector('button[type="submit"]');
            activateLoader(btn);

            formElement.action = "/helper/dryContact/" + inputValue;
            return true;
        }

        function clearByUserLabel() {
            let inputValue = document.getElementById("clearUserLabel").value;
            let form = document.getElementById("clear");
            form.action = "/helper/dryContact/" + inputValue;
        }

        document.addEventListener('DOMContentLoaded', function () {
            const forms = ['synchronizeSDR', 'synchronizeITBBU'];
            forms.forEach(id => {
                    const form = document.getElementById(id);
                    form.addEventListener('click', function (event) {
                        const isConfirmed = confirm('Confirm operation! NE configuration will be changed!');
                        if (!isConfirmed) {
                            event.preventDefault();
                        }
                    });
            });
        });

        function activateLoader(btn) {
            if (!btn || btn.disabled) return;

            const loader = btn.querySelector('.spinner-border');
            const btnText = btn.querySelector('.btn-text');

            btn.style.width = btn.offsetWidth + 'px';
            btn.style.height = btn.offsetHeight + 'px';

            if (btnText) btnText.style.display = 'none';
            if (loader) {
                loader.classList.remove('d-none');
                loader.style.display = 'inline-block';
            }
            setTimeout(() => {
                btn.disabled = true;
            }, 10);
        }
    </script>

    <div class="row">
        <div class="col-md-4">
            <form id="search" method="get" onsubmit="return handleSearch(this)">
                <input type="text" id="userLabel" name="userLabel" th:value="${sitename}" placeholder="Enter sitename" list="recent-list">
                <datalist id="recent-list">
                    <th:block th:each="query : ${searchCache}">
                        <option th:value="${query}"></option>
                    </th:block>
                </datalist>
                <button type="submit" class="btn btn-success" style="width: 90px;">
                    <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    <span class="btn-text">Search</span>
                </button>
            </form>
        </div>
        <div sec:authorize="hasAuthority('EXT_ALARM_MNG_FULL')" class="col-md-8">
            <form id="clear" th:if="${managedElement != null}" method="get" onsubmit="activateLoader(this.querySelector('button[type=submit]'))"
                  th:action="@{'/helper/dryContact/' + ${managedElement.userLabel}}">
                <button type="submit" class="btn btn-secondary float-right" style="width: 175px;">
                    <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    <span class="btn-text">Clear Changes</span>
                </button>
            </form>
        </div>
    </div>

    <div sec:authorize="hasAuthority('EXT_ALARM_MNG_FULL')" style="height: 5px;"></div>

    <style>
        legend {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .legend-title {
            flex-grow: 1;
            margin-left: auto;
            align-items: start;
        }

        .legend-button {
            margin-right: auto;
            align-items: end;
        }

        input::-webkit-calendar-picker-indicator {
            display: none !important;
        }
    </style>

    <div th:if="${managedElement != null}">
        <div sec:authorize="hasAuthority('EXT_ALARM_MNG_FULL')" th:if="${managedElement.getManagedElementType().toString.equals('SDR')}" id="repoSDR">
        <form action="#"
              th:action="@{/helper/dryContact/updateSDR}"
              method="post"
              th:object="${repo}">
            <input type="hidden" name="userLabel" th:value="${managedElement.userLabel}">
            <fieldset>
                <legend>
                    <span class="legend-title" th:text="${managedElement.userLabel} + ' (' + ${managedElement.ManagedElementType} + ') '
                        + ${managedElement.getParsedNe()}"> </span>
                    <button type="submit" class="btn btn-danger legend-button" style="width: 175px;" id="synchronizeSDR" onclick="activateLoader(this)">
                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        <span class="btn-text">! Synchronize Data</span>
                    </button>
                </legend>
                <table border="1" class="table table-striped table-bordered">
                    <thead>
                    <tr>
                        <th>operation</th>
                        <th>moId[1..32]</th>
                        <th>dryNo[0..15]</th>
                        <th>almUserLabel</th>
                        <th>almStatus</th>
                    </tr>
                    </thead>
                    <tbody th:if="${!repo.getData().isEmpty()}">
                    <tr th:each="dryContact, dryStat : *{data}">
                        <td>
                            <select th:field="*{data[__${dryStat.index}__].moOp}">
                                <option th:each="opr : ${T(bsshelper.externalapi.configurationmng.plannedserv.util.Operation).values()}"
                                        th:text="${opr}"
                                        th:value="${opr}">
                                </option>
                            </select>
                        </td>
                        <td>
                            <input th:if="${repo.constMoIds.contains(dryContact.moId)}"
                                   readonly type="number" th:field="*{data[__${dryStat.index}__].moId}"
                                   th:value="${dryContact.moId}"/>
                            <input th:unless="${repo.constMoIds.contains(dryContact.moId)}"
                                   type="number" th:field="*{data[__${dryStat.index}__].moId}"
                                   th:value="${dryContact.moId}"/>
                        </td>
                        <td>
                            <input type="number" th:field="*{data[__${dryStat.index}__].dryNo}"
                                   th:value="${dryContact.dryNo}"/>
                        </td>
                        <td>
                            <select th:field="*{data[__${dryStat.index}__].userLabel}">
                                <option th:each="almU : ${alarmUserLabels}"
                                        th:text="${almU}"
                                        th:value="${almU}">
                                </option>
                            </select>
                        </td>
                        <td>
                            <select th:field="*{data[__${dryStat.index}__].almStatus}">
                                <option th:each="almS : ${T(bsshelper.externalapi.configurationmng.plannedserv.util.drycontactenums.AlmStatus).values()}"
                                        th:text="${almS}"
                                        th:value="${almS}">
                                </option>
                            </select>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </fieldset>
            <div>
                <button th:formaction="@{/helper/dryContact/addRowSDR}"
                        onclick="activateLoader(this)"
                        type="submit" class="btn btn-primary text-center" style="width: 175px;">
                    <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    <span class="btn-text">Add DryContact</span>
                </button>
            </div>
        </form>
        </div>

        <div sec:authorize="hasAuthority('EXT_ALARM_MNG_FULL')" th:if="${managedElement.getManagedElementType().toString.equals('ITBBU')}" id="repoITBBU">
        <form action="#"
              th:action="@{/helper/dryContact/updateITBBU}"
              method="post"
              th:object="${repo}">
            <input type="hidden" name="userLabel" th:value="${managedElement.userLabel}">
            <fieldset>
                <legend>
                    <span class="legend-title" th:text="${managedElement.userLabel} + ' (' + ${managedElement.ManagedElementType} + ') '
                        + ${managedElement.getParsedNe()}"></span>
                    <button type="submit" class="btn btn-danger legend-button" style="width: 175px;" id="synchronizeITBBU" onclick="activateLoader(this)">
                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        <span class="btn-text">! Synchronize Data</span>
                    </button>
                </legend>
                <table border="1" class="table table-striped table-bordered">
                    <thead>
                    <tr>
                        <th>operation</th>
                        <th>moId[1..16]</th>
                        <th>almUserLabel</th>
                        <th>almStatus</th>
                    </tr>
                    </thead>
                    <tbody th:if="${!repo.getData().isEmpty()}">
                    <tr th:each="dryContact, dryStat : *{data}">
                        <td>
                            <select th:field="*{data[__${dryStat.index}__].moOp}">
                                <option th:each="opr : ${T(bsshelper.externalapi.configurationmng.plannedserv.util.Operation).values()}"
                                        th:text="${opr}"
                                        th:value="${opr}">
                                </option>
                            </select>
                        </td>
                        <td>
                            <input th:if="${repo.constMoIds.contains(dryContact.moId)}"
                                   readonly type="number" th:field="*{data[__${dryStat.index}__].moId}"
                                   th:value="${dryContact.moId}"/>
                            <input th:unless="${repo.constMoIds.contains(dryContact.moId)}"
                                   type="number" th:field="*{data[__${dryStat.index}__].moId}"
                                   th:value="${dryContact.moId}"/>
                        </td>
                        <td>
                            <select th:field="*{data[__${dryStat.index}__].userLabel}">
                                <option th:each="almU : ${alarmUserLabels}"
                                        th:text="${almU}"
                                        th:value="${almU}">
                                </option>
                            </select>
                        </td>
                        <td>
                            <select th:field="*{data[__${dryStat.index}__].alarmStatus}">
                                <option th:each="almS : ${T(bsshelper.externalapi.configurationmng.plannedserv.util.drycontactenums.AlmStatus).values()}"
                                        th:text="${almS}"
                                        th:value="${almS}">
                                </option>
                            </select>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </fieldset>
            <div>
                <button th:formaction="@{/helper/dryContact/addRowITBBU}"
                        onclick="activateLoader(this)"
                        type="submit" class="btn btn-primary text-center" style="width: 175px;">
                    <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    <span class="btn-text">Add DryContact</span>
                </button>
            </div>
        </form>
        </div>

        <fieldset sec:authorize="hasAuthority('EXT_ALARM_MNG_VIEW')" th:if="${managedElement.getManagedElementType().toString.equals('SDR')}">
            <legend>
            <span class="legend-title" th:text="${managedElement.userLabel} + ' (' + ${managedElement.ManagedElementType} + ') '
                + ${managedElement.getParsedNe()}"> </span>
            </legend>
            <table border="1" class="table table-striped table-sm table-bordered">
                <thead>
                <tr>
                    <th class="pl-3">moId</th>
                    <th class="pl-3">dryNo</th>
                    <th class="pl-3">almUserLabel</th>
                    <th class="pl-3">almStatus</th>
                </tr>
                </thead>
                <tbody th:if="${!repo.getData().isEmpty()}">
                <tr th:each="dryContact : ${repo.data}">
                    <td class="pl-3" th:text="${dryContact.moId}"></td>
                    <td class="pl-3" th:text="${dryContact.dryNo}"></td>
                    <td class="pl-3" th:text="${dryContact.userLabel}"></td>
                    <td class="pl-3" th:text="${dryContact.almStatus}"></td>
                </tr>
                </tbody>
            </table>
        </fieldset>

        <fieldset sec:authorize="hasAuthority('EXT_ALARM_MNG_VIEW')" th:if="${managedElement.getManagedElementType().toString.equals('ITBBU')}">
            <legend>
            <span class="legend-title" th:text="${managedElement.userLabel} + ' (' + ${managedElement.ManagedElementType} + ') '
                + ${managedElement.getParsedNe()}"> </span>
            </legend>
            <table border="1" class="table table-striped table-sm table-bordered">
                <thead>
                <tr>
                    <th class="pl-3">moId</th>
                    <th class="pl-3">almUserLabel</th>
                    <th class="pl-3">almStatus</th>
                </tr>
                </thead>
                <tbody th:if="${!repo.getData().isEmpty()}">
                <tr th:each="dryContact : ${repo.data}">
                    <td class="pl-3" th:text="${dryContact.moId}"></td>
                    <td class="pl-3" th:text="${dryContact.userLabel}"></td>
                    <td class="pl-3" th:text="${dryContact.alarmStatus}"></td>
                </tr>
                </tbody>
            </table>
        </fieldset>
    </div>

    <br/>
    <div th:if="${message != null && message.getSeverity().toString.equals('SUCCESS')}"
         th:text="${message.getMessage()}" class="alert alert-success" role="alert" id="alert-success">
    </div>
    <div th:if="${message != null && message.getSeverity().toString.equals('ERROR')}"
         th:text="${message.getMessage()}" class="alert alert-danger" role="alert" id="alert-danger">
    </div>
    <div th:if="${message != null && message.getSeverity().toString.equals('INFO')}"
         th:text="${message.getMessage()}" class="alert alert-info" role="alert" id="alert-info">
    </div>

</div>
</main>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
