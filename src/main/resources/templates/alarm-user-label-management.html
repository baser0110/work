<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AlarmUserLabels</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main>
    <div class="container">
        <br>
        <h2 th:text="${alarmUserLabel.id == null ? 'Create New AlarmUserLabel' : 'Edit AlarmUserLabel'}"></h2>

        <!-- Form submission tailored to alarmUserLabel endpoints -->
        <form th:action="@{${alarmUserLabel.id == null ? '/helper/appAccessMng/dataMng/alarmUserLabel/management/create' : '/helper/appAccessMng/dataMng/alarmUserLabel/management/edit'}}" th:object="${alarmUserLabel}" method="post">
            <input type="hidden" th:field="*{id}" />

            <!-- Code Input Field -->
            <div class="form-group col-md-4">
                <label for="code">Code</label>
                <input type="text" id="code" name="code" class="form-control"
                       th:field="*{code}" placeholder="Enter code"
                       th:readonly="${alarmUserLabel.id != null}" required />
            </div>

            <!-- User Label Input Field -->
            <div class="form-group col-md-4">
                <label for="userLabel">UserLabel</label>
                <input type="text" id="userLabel" name="userLabel" class="form-control"
                       th:field="*{userLabel}" placeholder="Enter userLabel" required />
            </div>

            <!-- Submit and Cancel Buttons -->
            <div class="form-group col-md-4">
                <button type="submit" class="btn btn-primary"
                        th:text="${alarmUserLabel.id == null ? 'Create' : 'Update'}"></button>
                <a href="/helper/appAccessMng/dataMng/alarmUserLabel" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
        <br>

        <!-- Error Notifications -->
        <div th:if="${param['code-existed']}" class="alert alert-danger">Code already exists!</div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
