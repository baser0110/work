<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Comment</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main>
    <div class="container">
        <br>
        <h2>Create New comment</h2>

        <form th:action="@{/helper/appAccessMng/dataMng/comment/management/create}" th:object="${comment}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-group col-md-4">
                <label for="comment">Comment</label>
                <input type="text" id="comment" name="comment" class="form-control"
                       th:field="*{comment}" placeholder="Enter comment"/>
            </div>

            <div class="form-group col-md-4">
                <button type="submit" class="btn btn-primary">Create</button>
                <a href="/helper/appAccessMng/dataMng/comment" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
        <br>

        <div th:if="${param['comment-existed']}" class="alert alert-danger">Comment already exists!</div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
