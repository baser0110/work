<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MECustomLinks</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .btn-custom1-size {
            width: 90px;
        }
        .btn-custom2-size {
            width: 140px;
        }
        .action-cell {
            vertical-align: middle;
            text-align: center;
        }
        .button-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }
        .button-container a {
            margin-left: 10px;
        }
    </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main>
    <div class="container">
        <br>
        <h2>MECustomLink List:</h2>

        <div class="mb-2">
            <button id="prevPage" onclick="changePage(-1)" class="btn btn-primary btn-sm btn-custom1-size" style="margin-right: 5px">Previous</button>
            <span id="pageInfo"></span>
            <button id="nextPage" onclick="changePage(1)" class="btn btn-primary btn-sm btn-custom1-size" style="margin-left: 5px">Next</button>
            <a href="/helper/appAccessMng/dataMng" class="btn btn-secondary btn-sm btn-custom1-size">Back</a>
        </div>

        <table id="MECustomLinkTable" class="table table-striped table-sm table-bordered">
            <thead>
            <tr>
                <th class="pl-5 pr-5">
                    <form action="#" method="get" class="form-inline" oninput="filterLabels()">
                        <input type="text" name="filters[userLabel]" class="form-control form-control-sm"
                               placeholder="UserLabel" style="font-weight: bold" id="userLabelFilter">
                    </form>
                </th>
                <th class="action-cell" width="30%">
                    Actions
                    <a href="/helper/appAccessMng/dataMng/meCustomLink/management/new" class="btn btn-success btn-sm btn-custom2-size" style="margin-left: 5px">Create</a>
                </th>
            </tr>
            </thead>
            <tbody>
            <!-- Labels will be dynamically rendered here by JavaScript -->
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer >

<script th:inline="javascript">
    // Inject labels list dynamically from Thymeleaf model
    let labels = /*[[${meCustomLinks}]]*/ [];
    let filteredLabels = labels;
    let currentPage = 1;
    const pageSize = 10;

    // Function to render labels with pagination
    function renderLabelsPaginated(page) {
        const tbody = $('#MECustomLinkTable tbody');
        tbody.empty();  // Clear existing rows

        if (filteredLabels.length === 0) {
            tbody.append('<tr><td colspan="3" class="text-center">No records found</td></tr>');
            $('#pageInfo').text('Page 0 of 0');
            return;
        }

        const start = (page - 1) * pageSize;
        const end = start + pageSize;
        const labelsToShow = filteredLabels.slice(start, end);

        labelsToShow.forEach(label => {
            tbody.append(`
                <tr>
                    <td class="pl-5 pr-5">${label.userLabel}</td>
                    <td class="action-cell">
                        <a href="/helper/appAccessMng/dataMng/meCustomLink/management/${label.id}" class="btn btn-warning btn-sm">Edit</a>
                        <form action="/helper/appAccessMng/dataMng/meCustomLink/management/delete/${label.id}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Confirm operation!')">Delete</button>
                        </form>
                    </td>
                </tr>
            `);
        });

        $('#pageInfo').text(`Page ${currentPage} of ${Math.ceil(filteredLabels.length / pageSize)}`);
    }

    // Function to filter labels based on search input
    function filterLabels() {
        const userLabelValue = $('#userLabelFilter').val().toLowerCase();

        filteredLabels = labels.filter(label => {
            const matchesLabel = label.userLabel ? label.userLabel.toLowerCase().includes(userLabelValue) : false;
            return matchesLabel;
        });

        currentPage = 1; // Reset to page 1 after filtering
        renderLabelsPaginated(currentPage); // Re-render table
    }

    // Function to change the page based on the navigation button clicks
    function changePage(delta) {
        const totalPages = Math.ceil(filteredLabels.length / pageSize);
        const newPage = currentPage + delta;

        if (newPage >= 1 && newPage <= totalPages) {
            currentPage = newPage;
            renderLabelsPaginated(currentPage);
        }
    }

    // Initial rendering when the page loads
    $(document).ready(function () {
        renderLabelsPaginated(currentPage);
    });
</script>
</body>
</html>
